# Default values for kagent
replicaCount: 1

global:
  tag: ""

openai:
  enabled: true
  secretName: "kagent-openai"
  apiKey: ""
  secretKey: "OPENAI_API_KEY"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

controller:
  image:
    repository: cr.kagent.dev/kagent-dev/kagent/controller
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env: {} # Additional environment variables for the controller can be added here

app:
  image:
    repository: cr.kagent.dev/kagent-dev/kagent/app
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env: {} # Additional environment variables for the app can be added here
  service:
    type: ClusterIP
    port: 8081
  livenessProbe:
    httpGet:
      path: /health
      port: http
  readinessProbe:
    httpGet:
      path: /health
      port: http

ui:
  image:
    repository: cr.kagent.dev/kagent-dev/kagent/ui
    pullPolicy: IfNotPresent
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env: {} # Additional environment variables for the ui can be added here
  service:
    type: ClusterIP
    port: 80
  livenessProbe:
    httpGet:
      path: /
      port: http
  readinessProbe:
    httpGet:
      path: /
      port: http

service:
  type: ClusterIP

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "kagent"

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

volumes: []

nodeSelector: {}

affinity: {}

tolerations: []

contrib:
  agents:
    k8s:
      enabled: true
      modelConfigRef: default-model-config
    istio:
      enabled: true
      modelConfigRef: default-model-config
    helm:
      enabled: true
      modelConfigRef: default-model-config
    promql:
      enabled: true
      modelConfigRef: default-model-config
    observability:
      prometheus:
        url: ""
        username: ""
        password: ""
      grafana:
        url: ""
        username: ""
        password: ""
        apiKey: ""
      enabled: true
      modelConfigRef: default-model-config
    argoRolloutsConversion:
      enabled: true
      modelConfigRef: default-model-config

otel:
  tracing:
    enabled: false
    exporter:
      otlp:
        endpoint: http://localhost:4317
        timeout: 10
        insecure: true
