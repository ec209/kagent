{{- if and .Values.slackBot.enabled .Values.slackBot.botToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.slackBot.secretName }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
type: Opaque
data:
  bot-token: {{ .Values.slackBot.botToken | b64enc }}
  signing-secret: {{ .Values.slackBot.signingSecret | b64enc }}
  app-token: {{ .Values.slackBot.appToken | b64enc }}
{{- end }} 