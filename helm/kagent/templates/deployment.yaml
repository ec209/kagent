apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kagent.fullname" . }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kagent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kagent.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "kagent.fullname" . }}
      containers:
        - name: controller
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.controller.image.registry }}/{{ .Values.controller.image.repository }}:{{ coalesce .Values.global.tag .Values.controller.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          env:
            - name: KAGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
          {{- with .Values.controller.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: litellm
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.litellm.image.registry }}/{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy | default "IfNotPresent" }}
          command: ["litellm", "--config", "/config/litellm_config.yaml", "--host", "0.0.0.0", "--port", "4000"]
          ports:
            - name: litellm
              containerPort: 4000
              protocol: TCP
          env:
            # Default AWS region (can be overridden by mounted secrets)
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
          # Add support for loading AWS credentials from an env file (e.g., a secret or configmap)
          # To use, create a secret or configmap with AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, etc., and reference it here.
          envFrom:
            - secretRef:
                name: aws-credentials   # <-- create this secret with your AWS credentials
          volumeMounts:
            - name: litellm-config
              mountPath: /config
              readOnly: true
          resources:
            {{- toYaml .Values.litellm.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
              httpHeaders:
                - name: Authorization
                  value: "Bearer sk-1234"
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
              httpHeaders:
                - name: Authorization
                  value: "Bearer sk-1234"
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: app
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.app.image.registry }}/{{ .Values.app.image.repository }}:{{ coalesce .Values.global.tag .Values.app.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.openai.secretName }}
                  key: {{ .Values.openai.secretKey }}
            - name: OTEL_TRACING_ENABLED
              value: {{ .Values.otel.tracing.enabled | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: {{ .Values.otel.tracing.exporter.otlp.endpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_TIMEOUT
              value: {{ .Values.otel.tracing.exporter.otlp.timeout | quote }}
            - name: OTEL_EXPORTER_OTLP_TRACES_INSECURE
              value: {{ .Values.otel.tracing.exporter.otlp.insecure | quote }}
            - name: KAGENT_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Point to the LiteLLM container for Bedrock proxy
            - name: LITELLM_PROXY_URL
              value: "http://localhost:4000"
          {{- with .Values.app.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.app.targetPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/version
              port: {{ .Values.service.ports.app.targetPort }}
            initialDelaySeconds: 3
            periodSeconds: 3
        - name: ui
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.ui.image.registry }}/{{ .Values.ui.image.repository }}:{{ coalesce .Values.global.tag .Values.ui.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          env:
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://{{ include "kagent.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local/api"
          {{- with .Values.ui.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.ui.targetPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
        {{- if .Values.slackBot.enabled }}
        - name: slack-bot
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.slackBot.image.registry }}/{{ .Values.slackBot.image.repository }}:{{ coalesce .Values.global.tag .Values.slackBot.image.tag .Chart.Version }}"
          imagePullPolicy: {{ .Values.slackBot.image.pullPolicy }}
          env:
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slackBot.secretName }}
                  key: bot-token
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slackBot.secretName }}
                  key: signing-secret
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slackBot.secretName }}
                  key: app-token
            - name: KAGENT_API_URL
              value: "http://localhost:8081"
            - name: KAGENT_CLI_PATH
              value: "/usr/local/bin/kagent"
            - name: PORT
              value: "3000"
          {{- with .Values.slackBot.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            {{- toYaml .Values.slackBot.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
        {{- end }}
      volumes:
        - name: litellm-config
          configMap:
            name: {{ include "kagent.fullname" . }}-litellm
