apiVersion: v1
kind: Service
metadata:
  name: {{ include "kagent.fullname" . }}
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
      name: app
    - port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
      name: ui
  selector:
    {{- include "kagent.selectorLabels" . | nindent 4 }}